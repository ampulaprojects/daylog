<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daylog</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; margin: 0; }
        h1 { font-size: 20px; }
        h2 { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
        textarea { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; font-family: inherit; }
        .auto-textarea {
            field-sizing: content;    /* Chrome 123+, Safari 18+, FF 128+ — auto-grow bez JS */
            min-height: 108px;        /* ~6 riadkov */
            max-height: 60vh;
            overflow-y: auto;
            resize: none;
        }
        input[type=text], input[type=date], input[type=time] { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; }
        button { padding: 8px 16px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { opacity: 0.8; }
        button:disabled { opacity: 0.45; cursor: default; }
        .btn-ghost { background: #eee; color: #333; }
        .btn-sm { padding: 4px 10px; font-size: 13px; }
        .section { margin-bottom: 24px; }
        .form-group { margin-bottom: 10px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        #status { font-size: 13px; color: green; margin-top: 8px; display: none; }
        .textarea-row { position: relative; }
        .textarea-btns { position: absolute; bottom: 8px; right: 8px; display: flex; gap: 6px; }
        #dictBtn, #photoBtn { padding: 4px 10px; font-size: 12px; background: #444; border-radius: 4px; color: #fff; border: none; cursor: pointer; }
        #dictBtn.active { background: #c00; }
        #dictBtn.hidden, #photoBtn.hidden { display: none; }
        .date-highlight { border-color: #f59e0b !important; box-shadow: 0 0 0 3px rgba(245,158,11,0.25) !important; }

        /* ── Badges ─────────────────────────────────────────────────────── */
        .badge { font-size: 11px; font-weight: 600; padding: 2px 7px; border-radius: 4px; color: #fff; white-space: nowrap; flex-shrink: 0; }
        .badge-liek      { background: #2563eb; }
        .badge-nalada    { background: #d97706; }
        .badge-spravanie { background: #7c3aed; }
        .badge-jedlo     { background: #16a34a; }
        .badge-aktivita  { background: #0891b2; }
        .badge-spatok    { background: #1e40af; }
        .badge-fyzicke   { background: #dc2626; }
        .badge-poznamka  { background: #6b7280; }

        /* ── Review panel ───────────────────────────────────────────────── */
        #reviewSection { display: none; }
        .review-meta { font-size: 13px; color: #888; margin-bottom: 12px; }

        /* cleaned text */
        .cleaned-box { border: 1px solid #d1fae5; background: #f0fdf4; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; }
        .cleaned-label { font-size: 12px; font-weight: 600; color: #16a34a; margin-bottom: 6px; }
        .cleaned-textarea { width: 100%; border: 1px solid #a7f3d0; border-radius: 4px; padding: 8px; font-size: 14px; font-family: inherit; background: transparent; }
        .cleaned-textarea:focus { outline: none; border-color: #16a34a; }
        .cleaned-actions { display: flex; gap: 6px; margin-top: 8px; }
        .cleaned-accepted { display: none; align-items: center; gap: 8px; font-size: 13px; color: #16a34a; margin-bottom: 12px; }

        /* edit entry text box */
        .edit-text-box { border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px 12px; margin-bottom: 12px; background: #fafafa; }
        .edit-text-label { font-size: 12px; font-weight: 600; color: #6b7280; margin-bottom: 6px; }
        .edit-text-area { background: #fff; }

        /* event rows — grid layout (mobile-first)
           .event-item .input-X má špecificitu (0,2,0) > input[type=text] (0,1,1) */
        .event-item {
            display: grid;
            grid-template-columns: auto auto 1fr auto;
            gap: 5px 8px;
            padding: 10px;
            border: 1px solid #e5e7eb;
            border-radius: 8px;
            margin-bottom: 8px;
            background: #fafafa;
            align-items: center;
        }
        .event-item .input-type  { grid-column: 1; grid-row: 1; }
        .event-item .del-btn     { grid-column: 4; grid-row: 1; }
        .event-item .input-value { grid-column: 1 / -1; grid-row: 2; width: 100%; }
        .event-item .input-note  { grid-column: 1 / -1; grid-row: 3; width: 100%; }

        .input-type {
            font-size: 11px; font-weight: 600;
            padding: 4px 22px 4px 8px; border-radius: 4px;
            color: #fff; border: none; cursor: pointer; flex-shrink: 0;
            background-color: #6b7280;
            background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 16 16'%3e%3cpath fill='none' stroke='white' stroke-linecap='round' stroke-linejoin='round' stroke-width='2' d='m2 5 6 6 6-6'/%3e%3c/svg%3e");
            background-repeat: no-repeat; background-position: right 5px center; background-size: 9px;
            -webkit-appearance: none; appearance: none;
        }
        /* background-color (nie shorthand) — zachová background-image šípku */
        .input-type.badge-liek      { background-color: #2563eb; }
        .input-type.badge-nalada    { background-color: #d97706; }
        .input-type.badge-spravanie { background-color: #7c3aed; }
        .input-type.badge-jedlo     { background-color: #16a34a; }
        .input-type.badge-aktivita  { background-color: #0891b2; }
        .input-type.badge-spatok    { background-color: #1e40af; }
        .input-type.badge-fyzicke   { background-color: #dc2626; }
        .input-type.badge-poznamka  { background-color: #6b7280; }
        .input-type option { background: #333; color: #fff; }

        .event-item .input-time {
            grid-column: 2; grid-row: 1;
            width: 95px;
            border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 13px; color: #555; padding: 4px 6px; background: #fff;
            font-variant-numeric: tabular-nums;
        }
        .event-item .input-value {
            border: 1px solid #d1d5db; border-radius: 4px;
            font-size: 14px; color: #111; padding: 4px 8px; background: #fff;
        }
        .event-item .input-note {
            border: 1px solid #e5e7eb; border-radius: 4px;
            font-size: 12px; color: #9ca3af; padding: 4px 8px; background: #fff;
            font-style: italic;
        }
        .event-item .input-time:focus,
        .event-item .input-value:focus,
        .event-item .input-note:focus { outline: none; border-color: #6b7280; }
        .event-item .input-note::placeholder { color: #d1d5db; font-style: italic; }

        .del-btn { background: none; color: #d1d5db; border: none; padding: 2px 5px; font-size: 15px; cursor: pointer; border-radius: 3px; flex-shrink: 0; }
        .del-btn:hover { background: #fee2e2; color: #dc2626; }
        .review-actions { display: flex; gap: 8px; margin-top: 12px; }
        .entry-editing { background: #f8fafc; border-color: #94a3b8; }
        .inline-edit-actions { display: flex; gap: 8px; margin-top: 12px; }
        .inline-event-list { margin: 10px 0; }
        .inline-recalc-bar { margin: 6px 0 2px; }
        .inline-recalc-notice {
            display: none; flex-direction: row; align-items: center; gap: 10px; flex-wrap: wrap;
            background: #fffbeb; border: 1px solid #fde68a; border-radius: 6px;
            padding: 8px 12px; margin-bottom: 6px; font-size: 13px; color: #92400e;
        }

        /* ── List controls ─────────────────────────────────────────────── */
        .list-controls { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
        .ctrl-group { display: flex; border: 1px solid #e5e7eb; border-radius: 6px; overflow: hidden; }
        .ctrl-btn { padding: 5px 12px; font-size: 12px; background: #fff; color: #555; border: none; border-right: 1px solid #e5e7eb; cursor: pointer; white-space: nowrap; }
        .ctrl-btn:last-child { border-right: none; }
        .ctrl-btn.active { background: #111; color: #fff; }
        .ctrl-btn:hover:not(.active) { background: #f5f5f5; }

        /* ── Day grouping ───────────────────────────────────────────────── */
        .day-group { margin-bottom: 16px; }
        .day-header { display: flex; justify-content: space-between; align-items: baseline; padding: 4px 0; border-bottom: 2px solid #e5e7eb; margin-bottom: 8px; }
        .day-date { font-size: 14px; font-weight: 600; color: #374151; }
        .day-count { font-size: 12px; color: #9ca3af; }

        /* ── Filters ────────────────────────────────────────────────────── */
        .filter-panel { margin-bottom: 10px; }
        .filter-toggle { width: 100%; text-align: left; background: none; border: 1px solid #e5e7eb; color: #555; padding: 5px 12px; font-size: 13px; border-radius: 6px; cursor: pointer; }
        .filter-toggle:hover { background: #f5f5f5; }
        .filter-toggle.has-filters { border-color: #374151; color: #111; font-weight: 600; }
        .filter-body { border: 1px solid #e5e7eb; border-radius: 6px; padding: 10px 12px; margin-top: 4px; }
        .filter-row { display: flex; flex-wrap: wrap; align-items: center; gap: 6px; margin-bottom: 8px; }
        .filter-row:last-child { margin-bottom: 0; }
        .filter-label { font-size: 12px; color: #888; white-space: nowrap; }
        .filter-row input[type=date] { width: auto; padding: 4px 8px; font-size: 13px; }
        .type-chip { padding: 3px 10px; font-size: 12px; border-radius: 12px; border: 1px solid #e5e7eb; background: #fff; cursor: pointer; color: #555; }
        .type-chip:hover { border-color: #9ca3af; }
        .type-chip.active { color: #fff; border-color: transparent; }
        .type-chip.active.t-liek      { background: #2563eb; }
        .type-chip.active.t-nalada    { background: #d97706; }
        .type-chip.active.t-spravanie { background: #7c3aed; }
        .type-chip.active.t-jedlo     { background: #16a34a; }
        .type-chip.active.t-aktivita  { background: #0891b2; }
        .type-chip.active.t-spatok    { background: #1e40af; }
        .type-chip.active.t-fyzicke   { background: #dc2626; }
        .type-chip.active.t-poznamka  { background: #6b7280; }
        .filter-count { font-size: 12px; color: #888; margin-bottom: 8px; }
        .filter-mode-note { font-size: 12px; color: #9ca3af; font-style: italic; margin-bottom: 8px; }
        .ev-row { display: flex; align-items: center; gap: 8px; padding: 6px 4px; border-bottom: 1px solid #f0f0f0; font-size: 13px; flex-wrap: wrap; }
        .ev-row:last-child { border-bottom: none; }
        .ev-row-date { color: #888; font-size: 12px; min-width: 78px; }
        .ev-row-time { color: #888; font-size: 12px; min-width: 42px; font-variant-numeric: tabular-nums; }
        .ev-row-val { color: #1a1a1a; }

        /* ── Entry list ─────────────────────────────────────────────────── */
        .entry { border: 1px solid #eee; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
        .entry-header { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 5px; }
        .entry-meta { font-size: 12px; color: #888; }
        .entry-btns { display: flex; gap: 4px; flex-shrink: 0; }
        .btn-edit-entry, .btn-del-entry { background: none; border: 1px solid #e5e7eb; border-radius: 3px; font-size: 11px; padding: 2px 7px; cursor: pointer; color: #aaa; }
        .btn-edit-entry:hover { background: #f5f5f5; color: #333; border-color: #ccc; }
        .btn-del-entry:hover  { background: #fee2e2; color: #dc2626; border-color: #fca5a5; }
        .entry-text { font-size: 14px; white-space: pre-wrap; color: #1a1a1a; }
        .entry-events { display: flex; flex-wrap: wrap; gap: 5px; margin-top: 8px; padding-top: 8px; border-top: 1px solid #f0f0f0; }
        .ev-pill { display: inline-flex; align-items: center; gap: 4px; font-size: 12px; color: #555; background: #f9f9f9; border: 1px solid #eee; border-radius: 4px; padding: 2px 6px; }
        .ev-t { color: #888; }
        .ev-n { color: #aaa; font-style: italic; }
        #searchInput { margin-bottom: 10px; }

        /* ── Review photo preview ──────────────────────────────────────── */
        #reviewPhoto { margin-bottom: 12px; }
        #reviewPhoto img { max-height: 200px; width: 100%; object-fit: contain; border-radius: 6px; cursor: zoom-in; border: 1px solid #e5e7eb; background: #f9fafb; }
        #reviewPhoto img:hover { border-color: #9ca3af; }

        /* ── Thumbnail ──────────────────────────────────────────────────── */
        .entry-thumb { margin-top: 8px; }
        .entry-thumb img { max-height: 80px; border-radius: 4px; cursor: zoom-in; border: 1px solid #e5e7eb; display: block; }
        .entry-thumb img:hover { border-color: #9ca3af; }

        /* ── Lightbox ───────────────────────────────────────────────────── */
        #photoOverlay {
            display: none; position: fixed; inset: 0;
            background: rgba(0,0,0,0.88);
            align-items: center; justify-content: center;
            z-index: 1000; cursor: zoom-out;
        }
        #photoOverlay img { max-width: 95vw; max-height: 95vh; border-radius: 6px; cursor: default; }

        /* ── Two-zone page layout ────────────────────────────────────────── */
        .page-wrap { max-width: 1300px; margin: 0 auto; padding: 16px; }
        .page-header { margin-bottom: 16px; }
        .page-layout { display: flex; flex-direction: column; }
        .layout-left, .layout-right { min-width: 0; }

        @media (min-width: 900px) {
            .page-layout {
                display: grid;
                grid-template-columns: 360px 1fr;
                column-gap: 32px;
                align-items: start;
            }
            .layout-left {
                position: sticky;
                top: 16px;
            }
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="page-header">
        <div style="display:flex;justify-content:space-between;align-items:center">
            <h1>daylog</h1>
            <div style="display:flex;gap:10px;align-items:center">
                <a href="/profile" style="font-size:13px;color:#888;text-decoration:none">Profil</a>
                <form method="POST" action="/logout">
                    <button type="submit" class="btn-ghost" style="padding:6px 12px;font-size:13px">Odhlásiť</button>
                </form>
            </div>
        </div>
    </div><!-- /page-header -->
    <div class="page-layout">
        <div class="layout-left">

    <!-- ── Formulár ───────────────────────────────────────────────────────── -->
    <div class="section" id="formSection">
        <div class="form-group">
            <label>Dátum</label>
            <input type="date" id="entryDate">
        </div>
        <div class="form-group">
            <label>Čas záznamu <span style="color:#bbb">(voliteľné)</span></label>
            <input type="time" id="entryTime">
        </div>
        <div class="form-group">
            <label>Záznam</label>
            <div class="textarea-row">
                <textarea id="entryText" class="auto-textarea" placeholder="Čo sa stalo..."></textarea>
                <div class="textarea-btns">
                    <button id="photoBtn" type="button" onclick="triggerPhoto()">📷 Foto</button>
                    <button id="dictBtn" type="button" onclick="toggleDictation()">🎤 Diktovať</button>
                </div>
            </div>
            <input type="file" id="photoInput" accept="image/*" capture="environment"
                   style="display:none" onchange="uploadPhoto(this)">
        </div>
        <button id="saveBtn" onclick="saveEntry()">Uložiť</button>
        <div id="status"></div>
    </div>

    <!-- ── Review / Edit panel ────────────────────────────────────────────── -->
    <div class="section" id="reviewSection">
        <h2 id="reviewTitle">Navrhnuté eventy</h2>
        <div class="review-meta" id="reviewMeta"></div>

        <!-- Náhľad fotky (ak existuje) -->
        <div id="reviewPhoto" style="display:none">
            <img id="reviewPhotoImg" src="" onclick="openPhoto(this.src)">
        </div>

        <!-- Navrhovaný text (iba nový záznam) -->
        <div class="cleaned-box" id="cleanedSection" style="display:none">
            <div class="cleaned-label">Navrhovaný text:</div>
            <textarea class="cleaned-textarea auto-textarea" id="cleanedPreview"></textarea>
            <div class="cleaned-actions">
                <button class="btn-sm" onclick="acceptCleaned()">Prijať</button>
                <button class="btn-ghost btn-sm" onclick="rejectCleaned()">Zamietnuť</button>
            </div>
        </div>
        <div class="cleaned-accepted" id="cleanedAccepted">
            <span>✓ Navrhovaný text prijatý</span>
            <button class="btn-ghost btn-sm" onclick="revertCleaned()">Vrátiť pôvodný</button>
        </div>

        <!-- Text záznamu (iba edit mode) -->
        <div class="edit-text-box" id="editTextSection" style="display:none">
            <div class="edit-text-label">Text záznamu</div>
            <textarea class="edit-text-area auto-textarea" id="editEntryText"></textarea>
        </div>

        <div id="eventList"></div>

        <div class="review-actions">
            <button id="confirmBtn" onclick="confirmEntry()">Potvrdiť a uložiť</button>
            <button class="btn-ghost" onclick="goBack()">← Späť</button>
        </div>
    </div>

        </div><!-- /layout-left -->
        <div class="layout-right">

    <!-- ── Zoznam záznamov ────────────────────────────────────────────────── -->
    <div class="section">
        <input type="text" id="searchInput" placeholder="Hľadať...">
        <div id="filterPanel" class="filter-panel">
            <button class="filter-toggle" id="filterToggle" onclick="toggleFilters()">Filtre ▾</button>
            <div id="filterBody" style="display:none">
                <div class="filter-row">
                    <span class="filter-label">Typ:</span>
                    <div id="typeChips" style="display:flex;flex-wrap:wrap;gap:4px"></div>
                </div>
                <div class="filter-row" id="filterModeRow" style="display:none">
                    <span class="filter-label">Zobraziť:</span>
                    <div class="ctrl-group">
                        <button class="ctrl-btn active" id="btn-filter-entries" onclick="setFilterMode('entries')">Celé záznamy</button>
                        <button class="ctrl-btn" id="btn-filter-events" onclick="setFilterMode('events')">Len eventy</button>
                    </div>
                </div>
                <div class="filter-row">
                    <span class="filter-label">Dátum od:</span>
                    <input type="date" id="filterFrom" onchange="applyFilters()">
                    <span class="filter-label">do:</span>
                    <input type="date" id="filterTo" onchange="applyFilters()">
                </div>
                <button class="btn-ghost btn-sm" onclick="clearFilters()">Zrušiť filtre</button>
            </div>
        </div>
        <div class="list-controls">
            <div class="ctrl-group">
                <button class="ctrl-btn active" id="btn-view-grouped" onclick="setViewMode('grouped')">Podľa dní</button>
                <button class="ctrl-btn" id="btn-view-flat" onclick="setViewMode('flat')">Zoznam</button>
            </div>
            <div class="ctrl-group">
                <button class="ctrl-btn active" id="btn-sort-event" onclick="setSortMode('event')">Dátum udalosti</button>
                <button class="ctrl-btn" id="btn-sort-created" onclick="setSortMode('created')">Dátum zápisu</button>
            </div>
        </div>
        <div id="filterCount" class="filter-count" style="display:none"></div>
        <div id="entryList"></div>
    </div>

        </div><!-- /layout-right -->
    </div><!-- /page-layout -->
</div><!-- /page-wrap -->

    <!-- ── Lightbox overlay ──────────────────────────────────────────────── -->
    <div id="photoOverlay" onclick="closePhoto()">
        <img id="photoOverlayImg" src="" onclick="event.stopPropagation()">
    </div>

    <script>
        const TYPES = ['liek','nalada','spravanie','jedlo','aktivita','spatok','fyzicke','poznamka'];
        const TYPE_LABELS = {
            liek: 'liek', nalada: 'nálada', spravanie: 'správanie',
            jedlo: 'jedlo', aktivita: 'aktivita', spatok: 'spánok',
            fyzicke: 'fyzické', poznamka: 'poznámka'
        };

        let loadedEntries    = [];
        let pendingData      = null;
        let editingId        = null;
        let cleanedText      = null;
        let usingCleaned     = false;
        let currentSource    = 'typed';
        let pendingPhotoPath = null;
        let inlineEditId          = null;
        let inlinePreRecalcEvents = null;  // snapshot eventov spred posledného prepočtu
        let viewMode = 'grouped';          // 'grouped' | 'flat'
        let sortMode = 'event';            // 'event' | 'created'
        let filterTypes    = new Set();    // vybrané typy eventov
        let filterMode     = 'entries';    // 'entries' | 'events'
        let filterDateFrom = '';
        let filterDateTo   = '';
        let filtersOpen    = false;

        function today() { return new Date().toISOString().split('T')[0]; }

        // ── Auto-resize textarea (JS fallback pre staršie browsery) ──────────
        const _fieldSizing = CSS.supports('field-sizing', 'content');
        function resizeTA(el) {
            if (_fieldSizing) return;
            el.style.height = 'auto';
            el.style.height = Math.min(el.scrollHeight, Math.floor(window.innerHeight * 0.6)) + 'px';
        }
        function setTA(id, val) {
            const el = document.getElementById(id);
            el.value = val;
            resizeTA(el);
        }
        document.addEventListener('input', e => {
            if (e.target.classList.contains('auto-textarea')) resizeTA(e.target);
        });

        function setReviewPhoto(photoPath) {
            const box = document.getElementById('reviewPhoto');
            if (photoPath) {
                const fname = photoPath.replace('uploads/', '');
                document.getElementById('reviewPhotoImg').src = '/photos/' + fname;
                box.style.display = 'block';
            } else {
                box.style.display = 'none';
                document.getElementById('reviewPhotoImg').src = '';
            }
        }

        function openPhoto(src) {
            document.getElementById('photoOverlayImg').src = src;
            document.getElementById('photoOverlay').style.display = 'flex';
        }
        function closePhoto() {
            document.getElementById('photoOverlay').style.display = 'none';
            document.getElementById('photoOverlayImg').src = '';
        }
        document.addEventListener('keydown', e => { if (e.key === 'Escape') closePhoto(); });
        function esc(s) {
            if (!s) return '';
            return String(s).replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
        }

        document.getElementById('entryDate').value = today();
        document.getElementById('searchInput').addEventListener('input', loadEntries);

        // ── Foto prepis ──────────────────────────────────────────────────────

        function triggerPhoto() { document.getElementById('photoInput').click(); }

        function highlightDate() {
            const el = document.getElementById('entryDate');
            el.classList.add('date-highlight');
            setTimeout(() => el.classList.remove('date-highlight'), 3000);
        }

        async function uploadPhoto(input) {
            if (!input.files || !input.files[0]) return;
            const file = input.files[0];
            input.value = '';
            const btn = document.getElementById('photoBtn');
            btn.disabled = true; btn.textContent = 'Prepisujem...';
            try {
                const fd = new FormData();
                fd.append('file', file);
                const resp = await fetch('/entries/transcribe', { method: 'POST', body: fd });
                if (resp.status === 401) { location.href = '/login'; return; }
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                setTA('entryText', data.transcription);
                pendingPhotoPath = data.photo_path;
                currentSource = 'photo';
                if (data.suggested_date) {
                    document.getElementById('entryDate').value = data.suggested_date;
                    highlightDate();
                }
            } catch(e) { alert('Chyba prepisu: ' + e.message); }
            finally { btn.disabled = false; btn.textContent = '📷 Foto'; }
        }

        // ── Nový záznam ──────────────────────────────────────────────────────

        async function saveEntry() {
            const text = document.getElementById('entryText').value.trim();
            if (!text) return alert('Zadaj text záznamu');
            const entryDate = document.getElementById('entryDate').value;
            const entryTime = document.getElementById('entryTime').value || null;
            pendingData = { entry_date: entryDate, entry_time: entryTime, text, source: currentSource };

            const btn = document.getElementById('saveBtn');
            btn.disabled = true; btn.textContent = 'Analyzujem...';
            try {
                const resp = await fetch('/entries/extract', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, entry_date: entryDate, entry_time: entryTime })
                });
                if (resp.status === 401) { location.href = '/login'; return; }
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                pendingData.llm_raw   = data.llm_raw   || null;
                pendingData.llm_model = data.llm_model || null;
                showReview(data.events, data.cleaned_text);
            } catch(e) { alert('Chyba extrakcie: ' + e.message); }
            finally { btn.disabled = false; btn.textContent = 'Uložiť'; }
        }

        function showReview(events, ct) {
            editingId = null;
            cleanedText = ct || null;
            usingCleaned = false;

            document.getElementById('formSection').style.display = 'none';
            document.getElementById('reviewSection').style.display = 'block';
            document.getElementById('reviewTitle').textContent = 'Navrhnuté eventy';
            document.getElementById('confirmBtn').textContent = 'Potvrdiť a uložiť';
            document.getElementById('editTextSection').style.display = 'none';
            document.getElementById('cleanedAccepted').style.display = 'none';

            renderEventList(events);

            const showCt = ct && ct.trim() !== pendingData.text.trim();
            document.getElementById('cleanedSection').style.display = showCt ? 'block' : 'none';
            if (showCt) setTA('cleanedPreview', ct);

            setReviewPhoto(pendingPhotoPath);
        }

        // ── Inline edit záznamu ──────────────────────────────────────────────

        function openEdit(entryId) {
            if (inlineEditId !== null && inlineEditId !== entryId) cancelInlineEdit(inlineEditId);
            const entry = loadedEntries.find(e => e.id === entryId);
            if (!entry) return;
            inlineEditId = entryId;
            inlinePreRecalcEvents = null;

            const entryEl = document.getElementById('entry-' + entryId);
            if (!entryEl) return;

            const photoHtml = entry.photo_path
                ? `<div style="margin-bottom:12px">
                       <img src="/photos/${esc(entry.photo_path.replace('uploads/',''))}"
                            onclick="openPhoto(this.src)"
                            style="max-height:200px;width:100%;object-fit:contain;border-radius:6px;cursor:zoom-in;border:1px solid #e5e7eb;background:#f9fafb">
                   </div>`
                : '';

            entryEl.classList.add('entry-editing');
            entryEl.innerHTML = `
                <div class="entry-header">
                    <div class="entry-meta">
                        ${esc(entry.entry_date)}${entry.entry_time ? ' ' + esc(entry.entry_time) : ''}
                        ${entry.author ? ' · <strong>' + esc(entry.author) + '</strong>' : ''}
                    </div>
                    <button class="btn-ghost btn-sm" onclick="cancelInlineEdit(${entryId})">Zrušiť</button>
                </div>
                ${photoHtml}
                <textarea class="auto-textarea" id="inline-text-${entryId}">${esc(entry.text)}</textarea>
                <div class="inline-recalc-bar">
                    <button class="btn-ghost btn-sm" id="inline-recalc-btn-${entryId}"
                            onclick="recalcInlineEvents(${entryId})">Prepočítať eventy z textu</button>
                </div>
                <div class="inline-recalc-notice" id="inline-recalc-notice-${entryId}">
                    <span>Eventy prepočítané z textu — skontroluj a ulož</span>
                    <button class="btn-ghost btn-sm" onclick="revertInlineEvents(${entryId})">Vrátiť pôvodné</button>
                </div>
                <div class="inline-event-list" id="inline-events-${entryId}">
                    ${buildEventRowsHtml(entry.events || [])}
                </div>
                <div class="inline-edit-actions">
                    <button onclick="saveInlineEdit(${entryId})">Uložiť zmeny</button>
                    <button class="btn-ghost" onclick="cancelInlineEdit(${entryId})">Zrušiť</button>
                </div>
            `;
            const ta = document.getElementById('inline-text-' + entryId);
            if (ta) resizeTA(ta);
        }

        async function saveInlineEdit(entryId) {
            const entryEl = document.getElementById('entry-' + entryId);
            if (!entryEl) return;
            const ta = document.getElementById('inline-text-' + entryId);
            const textToSave = ta ? ta.value.trim() : '';
            if (!textToSave) return alert('Text záznamu nesmie byť prázdny');
            const container = document.getElementById('inline-events-' + entryId);
            const events = Array.from(container.querySelectorAll('.event-item')).map(row => ({
                event_time: row.querySelector('.input-time').value  || null,
                event_type: row.querySelector('.input-type').value,
                value:      row.querySelector('.input-value').value.trim(),
                note:       row.querySelector('.input-note').value.trim() || null,
            })).filter(ev => ev.value);
            const saveBtn = entryEl.querySelector('.inline-edit-actions button');
            if (saveBtn) { saveBtn.disabled = true; saveBtn.textContent = 'Ukladám...'; }
            try {
                const resp = await fetch(`/entries/${entryId}`, {
                    method: 'PUT', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text: textToSave, events })
                });
                if (resp.status === 401) { location.href = '/login'; return; }
                if (!resp.ok) throw new Error(await resp.text());
                inlineEditId = null;
                inlinePreRecalcEvents = null;
                loadEntries();
            } catch(e) {
                alert('Chyba: ' + e.message);
                if (saveBtn) { saveBtn.disabled = false; saveBtn.textContent = 'Uložiť zmeny'; }
            }
        }

        function cancelInlineEdit(entryId) {
            const entryEl = document.getElementById('entry-' + entryId);
            const entry = loadedEntries.find(e => e.id === entryId);
            if (!entryEl || !entry) { inlineEditId = null; inlinePreRecalcEvents = null; return; }
            entryEl.classList.remove('entry-editing');
            entryEl.innerHTML = entryHtml(entry);
            inlineEditId = null;
            inlinePreRecalcEvents = null;
        }

        async function recalcInlineEvents(entryId) {
            const ta = document.getElementById('inline-text-' + entryId);
            if (!ta) return;
            const text = ta.value.trim();
            if (!text) return alert('Text záznamu je prázdny');

            // Zachyť aktuálne eventy pred prepočtom (vrátane ručných úprav)
            const container = document.getElementById('inline-events-' + entryId);
            inlinePreRecalcEvents = Array.from(container.querySelectorAll('.event-item')).map(row => ({
                event_time: row.querySelector('.input-time').value  || null,
                event_type: row.querySelector('.input-type').value,
                value:      row.querySelector('.input-value').value.trim(),
                note:       row.querySelector('.input-note').value.trim() || null,
            })).filter(ev => ev.value);

            const btn = document.getElementById('inline-recalc-btn-' + entryId);
            btn.disabled = true; btn.textContent = 'Prepočítavam...';
            try {
                const entryMeta = loadedEntries.find(e => e.id === entryId);
                const resp = await fetch('/entries/extract', {
                    method: 'POST', headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ text, entry_date: entryMeta ? entryMeta.entry_date : '' })
                });
                if (resp.status === 401) { location.href = '/login'; return; }
                if (!resp.ok) throw new Error(await resp.text());
                const data = await resp.json();
                container.innerHTML = buildEventRowsHtml(data.events || []);
                document.getElementById('inline-recalc-notice-' + entryId).style.display = 'flex';
            } catch(e) {
                alert('Chyba prepočtu: ' + e.message);
                inlinePreRecalcEvents = null;
            } finally {
                btn.disabled = false; btn.textContent = 'Prepočítať eventy z textu';
            }
        }

        function revertInlineEvents(entryId) {
            if (inlinePreRecalcEvents === null) return;
            const container = document.getElementById('inline-events-' + entryId);
            container.innerHTML = buildEventRowsHtml(inlinePreRecalcEvents);
            document.getElementById('inline-recalc-notice-' + entryId).style.display = 'none';
            inlinePreRecalcEvents = null;
        }

        async function deleteEntry(entryId) {
            if (!confirm('Zmazať celý záznam aj so všetkými eventmi?')) return;
            const resp = await fetch(`/entries/${entryId}`, { method: 'DELETE' });
            if (resp.ok || resp.status === 204) loadEntries();
        }

        // ── Review panel helpers ─────────────────────────────────────────────

        function typeOptions(selected) {
            return TYPES.map(t =>
                `<option value="${t}"${t === selected ? ' selected' : ''}>${TYPE_LABELS[t]}</option>`
            ).join('');
        }

        function buildEventRowsHtml(events, onDelete) {
            if (!events || !events.length) {
                return '<p style="color:#888;font-size:14px;margin-bottom:8px">Žiadne eventy.</p>';
            }
            const delOnclick = onDelete
                ? `this.closest('.event-item').remove(); ${onDelete}`
                : `this.closest('.event-item').remove()`;
            return events.map(ev => `
                <div class="event-item">
                    <select class="input-type badge-${ev.event_type}"
                            onchange="this.className='input-type badge-'+this.value">
                        ${typeOptions(ev.event_type)}
                    </select>
                    <input type="time"  class="input-time"  value="${esc(ev.event_time || '')}">
                    <input type="text"  class="input-value" value="${esc(ev.value)}">
                    <input type="text"  class="input-note"  placeholder="poznámka..." value="${esc(ev.note || '')}">
                    <button class="del-btn" onclick="${delOnclick}" title="Odstrániť">✕</button>
                </div>
            `).join('');
        }

        function renderEventList(events) {
            const n = events.length;
            document.getElementById('reviewMeta').textContent =
                `${pendingData.entry_date}${pendingData.entry_time ? ' ' + pendingData.entry_time : ''} · ${n} event${n !== 1 ? 'ov' : ''}`;
            document.getElementById('eventList').innerHTML = buildEventRowsHtml(events, 'updateReviewMeta()');
        }

        function updateReviewMeta() {
            if (!pendingData) return;
            const n = document.querySelectorAll('#eventList .event-item').length;
            document.getElementById('reviewMeta').textContent =
                `${pendingData.entry_date}${pendingData.entry_time ? ' ' + pendingData.entry_time : ''} · ${n} event${n !== 1 ? 'ov' : ''}`;
        }

        function gatherEvents() {
            return Array.from(document.querySelectorAll('#eventList .event-item')).map(row => ({
                event_time: row.querySelector('.input-time').value  || null,
                event_type: row.querySelector('.input-type').value,
                value:      row.querySelector('.input-value').value.trim(),
                note:       row.querySelector('.input-note').value.trim() || null,
            })).filter(ev => ev.value);
        }

        // ── Cleaned text ─────────────────────────────────────────────────────

        function acceptCleaned() {
            usingCleaned = true;
            document.getElementById('cleanedSection').style.display = 'none';
            document.getElementById('cleanedAccepted').style.display = 'flex';
        }
        function rejectCleaned() {
            document.getElementById('cleanedSection').style.display = 'none';
        }
        function revertCleaned() {
            usingCleaned = false;
            document.getElementById('cleanedAccepted').style.display = 'none';
            document.getElementById('cleanedSection').style.display = 'block';
        }

        // ── Potvrdiť / Späť ──────────────────────────────────────────────────

        async function confirmEntry() {
            const btn = document.getElementById('confirmBtn');
            btn.disabled = true; btn.textContent = 'Ukladám...';
            try {
                const events = gatherEvents();
                let textToSave;
                if (editingId) {
                    textToSave = document.getElementById('editEntryText').value.trim() || pendingData.text;
                } else {
                    textToSave = usingCleaned
                        ? document.getElementById('cleanedPreview').value
                        : pendingData.text;
                }

                let resp, data;
                if (editingId) {
                    resp = await fetch(`/entries/${editingId}`, {
                        method: 'PUT', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ text: textToSave, events })
                    });
                } else {
                    resp = await fetch('/entries/confirm', {
                        method: 'POST', headers: { 'Content-Type': 'application/json' },
                        body: JSON.stringify({ ...pendingData, text: textToSave, events, photo_path: pendingPhotoPath || null })
                    });
                }
                if (resp.status === 401) { location.href = '/login'; return; }
                if (!resp.ok) throw new Error(await resp.text());
                data = await resp.json();

                // Reset
                const wasEdit = !!editingId;
                editingId = null; cleanedText = null; usingCleaned = false; pendingData = null; pendingPhotoPath = null;
                document.getElementById('reviewSection').style.display = 'none';
                document.getElementById('formSection').style.display = 'block';
                document.getElementById('editTextSection').style.display = 'none';
                document.getElementById('cleanedSection').style.display = 'none';
                document.getElementById('cleanedAccepted').style.display = 'none';

                if (!wasEdit) {
                    setTA('entryText', '');
                    document.getElementById('entryTime').value = '';
                    document.getElementById('entryDate').value = today();
                    currentSource = 'typed';
                }

                const s = document.getElementById('status');
                s.textContent = `✓ ${wasEdit ? 'Upravené' : 'Uložené'} — entry #${data.entry_id}, ${data.event_count} eventov`;
                s.style.display = 'block';
                setTimeout(() => s.style.display = 'none', 4000);
                loadEntries();
            } catch(e) { alert('Chyba: ' + e.message); }
            finally {
                btn.disabled = false;
                btn.textContent = editingId ? 'Uložiť zmeny' : 'Potvrdiť a uložiť';
            }
        }

        function goBack() {
            editingId = null; cleanedText = null; usingCleaned = false; pendingPhotoPath = null;
            setReviewPhoto(null);
            document.getElementById('reviewSection').style.display = 'none';
            document.getElementById('formSection').style.display = 'block';
            document.getElementById('editTextSection').style.display = 'none';
            document.getElementById('reviewTitle').textContent = 'Navrhnuté eventy';
            document.getElementById('confirmBtn').textContent = 'Potvrdiť a uložiť';
        }

        // ── Zoznam záznamov ──────────────────────────────────────────────────

        function eventsHtml(events) {
            if (!events || !events.length) return '';
            const pills = events.map(ev =>
                `<span class="ev-pill">
                    <span class="badge badge-${ev.event_type}">${TYPE_LABELS[ev.event_type] || ev.event_type}</span>
                    ${ev.event_time ? `<span class="ev-t">${esc(ev.event_time)}</span>` : ''}
                    <span>${esc(ev.value)}</span>
                    ${ev.note ? `<span class="ev-n">— ${esc(ev.note)}</span>` : ''}
                </span>`
            ).join('');
            return `<div class="entry-events">${pills}</div>`;
        }

        function entryHtml(e) {
            return `
                <div class="entry-header">
                    <div class="entry-meta">
                        ${esc(e.entry_date)}${e.entry_time ? ' ' + esc(e.entry_time) : ''}
                        ${e.author ? ' · <strong>' + esc(e.author) + '</strong>' : ''}
                    </div>
                    <div class="entry-btns">
                        <button class="btn-edit-entry" onclick="openEdit(${e.id})">upraviť</button>
                        <button class="btn-del-entry"  onclick="deleteEntry(${e.id})">zmazať</button>
                    </div>
                </div>
                <div class="entry-text">${esc(e.text)}</div>
                ${e.photo_path ? `<div class="entry-thumb"><img src="/photos/${esc(e.photo_path.replace('uploads/',''))}" onclick="openPhoto(this.src)" loading="lazy"></div>` : ''}
                ${eventsHtml(e.events)}
            `;
        }

        // ── Zobrazenie a triedenie ───────────────────────────────────────────

        const SK_MONTHS = ['januára','februára','marca','apríla','mája','júna',
                           'júla','augusta','septembra','októbra','novembra','decembra'];

        function formatSKDate(iso) {
            if (!iso) return iso;
            const p = iso.split('-');
            if (p.length !== 3) return iso;
            const [y, m, d] = p.map(Number);
            if (!y || !m || !d) return iso;
            return `${d}. ${SK_MONTHS[m - 1]} ${y}`;
        }

        function sortedEntries(src) {
            return [...(src !== undefined ? src : loadedEntries)].sort((a, b) => {
                if (sortMode === 'event') {
                    const ka = (a.entry_date || '') + (a.entry_time || '');
                    const kb = (b.entry_date || '') + (b.entry_time || '');
                    return kb.localeCompare(ka);
                }
                return (b.created_at || '').localeCompare(a.created_at || '');
            });
        }

        function dateFilteredEntries() {
            let e = loadedEntries;
            if (filterDateFrom) e = e.filter(x => x.entry_date >= filterDateFrom);
            if (filterDateTo)   e = e.filter(x => x.entry_date <= filterDateTo);
            return e;
        }

        function filteredEntries() {
            let e = dateFilteredEntries();
            if (filterTypes.size > 0) {
                e = e.filter(x => (x.events || []).some(ev => filterTypes.has(ev.event_type)));
            }
            return e;
        }

        function updateFilterCount(shown, total, eventsMode) {
            const el = document.getElementById('filterCount');
            const active = filterTypes.size > 0 || filterDateFrom || filterDateTo;
            if (!active) { el.style.display = 'none'; return; }
            el.style.display = 'block';
            el.textContent = eventsMode
                ? `Zobrazených ${shown} eventov (z ${total} záznamov)`
                : `Zobrazených ${shown} z ${total} záznamov`;
        }

        function renderEventsMode(list) {
            const entries = sortedEntries(dateFilteredEntries());
            const rows = [];
            for (const e of entries) {
                for (const ev of (e.events || [])) {
                    if (filterTypes.has(ev.event_type)) rows.push({ ev, entry: e });
                }
            }
            updateFilterCount(rows.length, loadedEntries.length, true);
            if (!rows.length) {
                list.innerHTML = '<p style="color:#888;font-size:14px">Žiadne eventy</p>';
                return;
            }
            list.innerHTML = `
                <p class="filter-mode-note">Ploché zobrazenie — len vyfiltrované eventy bez kontextu záznamu</p>
                ${rows.map(({ev, entry}) => `
                    <div class="ev-row">
                        <span class="ev-row-date">${esc(entry.entry_date)}</span>
                        <span class="ev-row-time">${esc(ev.event_time || '—')}</span>
                        <span class="badge badge-${ev.event_type}">${TYPE_LABELS[ev.event_type] || ev.event_type}</span>
                        <span class="ev-row-val">${esc(ev.value)}</span>
                        ${ev.note ? `<span class="ev-n">— ${esc(ev.note)}</span>` : ''}
                    </div>
                `).join('')}
            `;
        }

        function groupByEntryDate(entries) {
            const map = new Map(), order = [];
            for (const e of entries) {
                const k = e.entry_date || '—';
                if (!map.has(k)) { map.set(k, []); order.push(k); }
                map.get(k).push(e);
            }
            return order.map(k => ({ date: k, entries: map.get(k) }));
        }

        function countLabel(n) {
            if (n === 1) return '1 záznam';
            if (n < 5) return `${n} záznamy`;
            return `${n} záznamov`;
        }

        function renderList() {
            if (inlineEditId !== null) cancelInlineEdit(inlineEditId);
            const list = document.getElementById('entryList');

            if (filterMode === 'events' && filterTypes.size > 0) {
                renderEventsMode(list);
                updateListControls();
                return;
            }

            const filtered = filteredEntries();
            const entries  = sortedEntries(filtered);
            updateFilterCount(filtered.length, loadedEntries.length, false);

            if (!entries.length) {
                list.innerHTML = '<p style="color:#888;font-size:14px">Žiadne záznamy</p>';
                updateListControls();
                return;
            }
            if (viewMode === 'flat') {
                list.innerHTML = entries.map(e =>
                    `<div class="entry" id="entry-${e.id}">${entryHtml(e)}</div>`
                ).join('');
            } else {
                list.innerHTML = groupByEntryDate(entries).map(g => `
                    <div class="day-group">
                        <div class="day-header">
                            <span class="day-date">${formatSKDate(g.date)}</span>
                            <span class="day-count">${countLabel(g.entries.length)}</span>
                        </div>
                        ${g.entries.map(e => `<div class="entry" id="entry-${e.id}">${entryHtml(e)}</div>`).join('')}
                    </div>
                `).join('');
            }
            updateListControls();
        }

        function updateListControls() {
            document.getElementById('btn-view-grouped').classList.toggle('active', viewMode === 'grouped');
            document.getElementById('btn-view-flat').classList.toggle('active', viewMode === 'flat');
            document.getElementById('btn-sort-event').classList.toggle('active', sortMode === 'event');
            document.getElementById('btn-sort-created').classList.toggle('active', sortMode === 'created');
        }

        function setViewMode(mode) { viewMode = mode; renderList(); }
        function setSortMode(mode) { sortMode = mode; renderList(); }

        // ── Filtre ───────────────────────────────────────────────────────────

        function toggleFilters() {
            filtersOpen = !filtersOpen;
            document.getElementById('filterBody').style.display = filtersOpen ? 'block' : 'none';
            updateFilterToggle();
        }

        function updateFilterToggle() {
            const count = filterTypes.size + (filterDateFrom ? 1 : 0) + (filterDateTo ? 1 : 0);
            const btn = document.getElementById('filterToggle');
            const arrow = filtersOpen ? '▴' : '▾';
            btn.textContent = count > 0 ? `Filtre (${count} aktívne) ${arrow}` : `Filtre ${arrow}`;
            btn.classList.toggle('has-filters', count > 0);
            document.getElementById('filterModeRow').style.display = filterTypes.size > 0 ? 'flex' : 'none';
            document.getElementById('btn-filter-entries').classList.toggle('active', filterMode === 'entries');
            document.getElementById('btn-filter-events').classList.toggle('active', filterMode === 'events');
        }

        function renderTypeChips() {
            document.getElementById('typeChips').innerHTML = TYPES.map(t =>
                `<button class="type-chip t-${t}${filterTypes.has(t) ? ' active' : ''}"
                         onclick="toggleTypeFilter('${t}')">${TYPE_LABELS[t]}</button>`
            ).join('');
        }

        function toggleTypeFilter(type) {
            if (filterTypes.has(type)) {
                filterTypes.delete(type);
                if (filterTypes.size === 0) filterMode = 'entries';
            } else {
                filterTypes.add(type);
            }
            renderTypeChips();
            updateFilterToggle();
            renderList();
        }

        function setFilterMode(mode) {
            filterMode = mode;
            updateFilterToggle();
            renderList();
        }

        function applyFilters() {
            filterDateFrom = document.getElementById('filterFrom').value;
            filterDateTo   = document.getElementById('filterTo').value;
            updateFilterToggle();
            renderList();
        }

        function clearFilters() {
            filterTypes.clear();
            filterMode     = 'entries';
            filterDateFrom = '';
            filterDateTo   = '';
            document.getElementById('filterFrom').value = '';
            document.getElementById('filterTo').value   = '';
            renderTypeChips();
            updateFilterToggle();
            renderList();
        }

        async function loadEntries() {
            const search = document.getElementById('searchInput').value.trim();
            const url = search ? `/entries?search=${encodeURIComponent(search)}` : '/entries';
            const resp = await fetch(url);
            if (resp.status === 401) { location.href = '/login'; return; }
            loadedEntries = await resp.json();
            inlineEditId = null;
            renderList();
        }

        loadEntries();
        renderTypeChips();

        // ── Diktovanie ───────────────────────────────────────────────────────

        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const dictBtn = document.getElementById('dictBtn');
        let recognition = null, dictating = false;

        if (!SpeechRecognition) {
            dictBtn.classList.add('hidden');
        } else {
            recognition = new SpeechRecognition();
            recognition.lang = 'sk-SK';
            recognition.continuous = true;
            recognition.interimResults = false;
            recognition.onresult = (e) => {
                const ta = document.getElementById('entryText');
                for (let i = e.resultIndex; i < e.results.length; i++) {
                    if (e.results[i].isFinal) {
                        const t = e.results[i][0].transcript;
                        ta.value = ta.value ? ta.value + ' ' + t : t;
                        currentSource = 'voice';
                    }
                }
            };
            recognition.onend = () => { if (dictating) recognition.start(); };
            recognition.onerror = (e) => {
                if (e.error !== 'aborted') {
                    dictating = false;
                    dictBtn.textContent = '🎤 Diktovať';
                    dictBtn.classList.remove('active');
                }
            };
        }

        function toggleDictation() {
            if (!recognition) return;
            if (dictating) {
                dictating = false;
                recognition.onend = null;
                recognition.stop();
                dictBtn.textContent = '🎤 Diktovať';
                dictBtn.classList.remove('active');
            } else {
                dictating = true;
                currentSource = 'voice';
                recognition.start();
                dictBtn.textContent = '⏹ Zastaviť';
                dictBtn.classList.add('active');
            }
        }
    </script>
</body>
</html>
