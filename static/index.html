<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daylog</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; max-width: 700px; margin: 0 auto; padding: 16px; }
        h1 { font-size: 20px; margin-bottom: 16px; }
        textarea { width: 100%; height: 120px; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; resize: vertical; }
        input { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 8px; }
        button { padding: 8px 16px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { opacity: 0.8; }
        .entry { border: 1px solid #eee; border-radius: 6px; padding: 12px; margin-bottom: 10px; }
        .entry-date { font-size: 12px; color: #888; margin-bottom: 4px; }
        .entry-mood { font-size: 12px; color: #555; }
        .entry-text { font-size: 14px; margin-top: 6px; white-space: pre-wrap; }
        .form-group { margin-bottom: 10px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        #status { font-size: 13px; color: green; margin-top: 8px; display: none; }
        .section { margin-bottom: 24px; }
    </style>
</head>
<body>
    <h1>daylog</h1>

    <div class="section">
        <div class="form-group">
            <label>Dátum</label>
            <input type="date" id="entryDate">
        </div>
        <div class="form-group">
            <label>Nadpis (voliteľné)</label>
            <input type="text" id="entryTitle" placeholder="napr. ranná epizóda...">
        </div>
        <div class="form-group">
            <label>Záznam</label>
            <textarea id="entryText" placeholder="Čo sa stalo..."></textarea>
        </div>
        <div class="form-group">
            <label>Nálada</label>
            <input type="text" id="entryMood" placeholder="napr. dobrý deň, epizóda...">
        </div>
        <button onclick="saveEntry()">Uložiť</button>
        <div id="status">✓ Uložené</div>
    </div>

    <div class="section">
        <input type="text" id="searchInput" placeholder="Hľadať..." oninput="loadEntries()">
        <div id="entryList"></div>
    </div>

    <script>
        const API = '';

        function today() {
            return new Date().toISOString().split('T')[0];
        }

        document.getElementById('entryDate').value = today();

        async function saveEntry() {
            const text = document.getElementById('entryText').value.trim();
            if (!text) return alert('Zadaj text záznamu');
            const body = {
                entry_date: document.getElementById('entryDate').value,
                title: document.getElementById('entryTitle').value.trim() || null,
                text,
                mood: document.getElementById('entryMood').value.trim() || null,
                tags: [],
                source: 'typed'
            };
            const resp = await fetch(`${API}/entries`, {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify(body)
            });
            if (resp.ok) {
                document.getElementById('entryText').value = '';
                document.getElementById('entryTitle').value = '';
                document.getElementById('entryMood').value = '';
                document.getElementById('entryDate').value = today();
                const s = document.getElementById('status');
                s.style.display = 'block';
                setTimeout(() => s.style.display = 'none', 2000);
                loadEntries();
            }
        }

        async function loadEntries() {
            const search = document.getElementById('searchInput').value.trim();
            const url = search ? `/entries?search=${encodeURIComponent(search)}` : '/entries';
            const resp = await fetch(url);
            const entries = await resp.json();
            const list = document.getElementById('entryList');
            if (!entries.length) { list.innerHTML = '<p style="color:#888;font-size:14px;margin-top:12px">Žiadne záznamy</p>'; return; }
            list.innerHTML = entries.map(e => `
                <div class="entry">
                    <div class="entry-date">${e.entry_date}${e.mood ? ' · ' + e.mood : ''}</div>
                    ${e.title ? `<strong style="font-size:14px">${e.title}</strong>` : ''}
                    <div class="entry-text">${e.text}</div>
                </div>
            `).join('');
        }

        loadEntries();
    </script>
</body>
</html>
