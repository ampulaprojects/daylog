<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daylog — prihlásenie</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        .card { background: #fff; border-radius: 10px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { font-size: 20px; margin-bottom: 24px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 14px; }
        button { width: 100%; padding: 10px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { opacity: 0.8; }
        .error { color: #c00; font-size: 13px; margin-bottom: 14px; display: none; }
    </style>
</head>
<body>
    <div class="card">
        <h1>daylog</h1>
        <div class="error" id="errorMsg">Nesprávne meno alebo heslo</div>
        <form method="POST" action="/login">
            <label>Meno</label>
            <input type="text" name="username" autocomplete="username" required>
            <label>Heslo</label>
            <input type="password" name="password" autocomplete="current-password" required>
            <button type="submit">Prihlásiť</button>
        </form>
    </div>
    <script>
        if (new URLSearchParams(location.search).get('error')) {
            document.getElementById('errorMsg').style.display = 'block';
        }
    </script>
</body>
</html>
