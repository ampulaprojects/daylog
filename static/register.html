<!DOCTYPE html>
<html lang="sk">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>daylog — registrácia</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: system-ui, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; background: #f5f5f5; }
        .card { background: #fff; border-radius: 10px; padding: 32px; width: 100%; max-width: 360px; box-shadow: 0 2px 8px rgba(0,0,0,0.08); }
        h1 { font-size: 20px; margin-bottom: 6px; }
        .sub { font-size: 13px; color: #888; margin-bottom: 24px; }
        label { font-size: 13px; color: #555; display: block; margin-bottom: 4px; }
        input { width: 100%; padding: 8px; font-size: 14px; border: 1px solid #ccc; border-radius: 6px; margin-bottom: 14px; }
        button { width: 100%; padding: 10px; background: #000; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 14px; }
        button:hover { opacity: 0.8; }
        .msg { font-size: 13px; margin-bottom: 14px; display: none; padding: 8px; border-radius: 6px; }
        .msg.error { color: #c00; background: #fff0f0; border: 1px solid #fcc; }
        .login-link { text-align: center; margin-top: 16px; font-size: 13px; color: #555; }
        .login-link a { color: #000; }
    </style>
</head>
<body>
    <div class="card">
        <h1>daylog</h1>
        <p class="sub">Registrácia — vyžaduje pozvánku</p>
        <div class="msg error" id="errorMsg"></div>
        <form method="POST" action="/register">
            <label>Email (musí byť na whitelist)</label>
            <input type="email" name="email" required>
            <label>Užívateľské meno</label>
            <input type="text" name="username" required>
            <label>Heslo (min. 6 znakov)</label>
            <input type="password" name="password" required minlength="6">
            <button type="submit">Zaregistrovať sa</button>
        </form>
        <div class="login-link"><a href="/login">Späť na prihlásenie</a></div>
    </div>
    <script>
        const errors = {
            whitelist: 'Tento email nie je na whitelistе. Požiadaj administrátora o prístup.',
            taken: 'Užívateľské meno alebo email je už obsadený.',
            short: 'Heslo musí mať aspoň 6 znakov.'
        };
        const e = new URLSearchParams(location.search).get('error');
        if (e && errors[e]) {
            const el = document.getElementById('errorMsg');
            el.textContent = errors[e];
            el.style.display = 'block';
        }
    </script>
</body>
</html>
